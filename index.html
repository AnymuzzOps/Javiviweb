<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Observador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #0e0e0e;
      --surface:   #161616;
      --border:    #2a2a2a;
      --muted:     #555;
      --text:      #e8e3db;
      --text-dim:  #9a9288;
      --accent:    #c8a96e;
      --accent-glow: rgba(200, 169, 110, 0.15);
      --white:     #ffffff;
      --radius:    4px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── NOISE TEXTURE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ─── HEADER ─── */
    header {
      position: relative;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(1.5rem, 5vw, 5rem);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--border);
    }

    .header-date {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .header-tagline {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .header-main {
      padding: 2.5rem 0 2rem;
      text-align: center;
    }

    .site-name {
      font-family: var(--font-display);
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--white);
      text-transform: uppercase;
    }

    .site-name span {
      color: var(--accent);
      font-style: italic;
    }

    .site-description {
      margin-top: 1rem;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .header-rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .header-rule::before,
    .header-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .header-rule-diamond {
      width: 6px;
      height: 6px;
      background: var(--accent);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ─── MAIN CONTENT ─── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 4rem) clamp(1.5rem, 5vw, 3rem);
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .section-label span {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── GRID ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5px;
      background: var(--border);
      border: 1.5px solid var(--border);
    }

    /* ─── CARD ─── */
    .card {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: background 0.25s ease;
      animation: fadeUp 0.5s ease both;
    }

    .card:hover {
      background: #1c1c1c;
    }

    .card:hover .card-image img {
      transform: scale(1.04);
    }

    .card:hover .card-title {
      color: var(--accent);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #1a1a1a;
      position: relative;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
      filter: grayscale(20%) brightness(0.85);
    }

    .card-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
    }

    .card-image-placeholder svg {
      opacity: 0.15;
    }

    .card-body {
      padding: 1.75rem 1.75rem 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .card-date {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-dot {
      width: 3px;
      height: 3px;
      background: var(--border);
      border-radius: 50%;
    }

    .card-num {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--border);
      font-variant-numeric: tabular-nums;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: clamp(1.25rem, 2.5vw, 1.5rem);
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
      transition: color 0.2s ease;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-dim);
      line-height: 1.65;
      flex: 1;
    }

    .card-arrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-top: 0.5rem;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ─── EMPTY / ERROR STATES ─── */
    .state-message {
      grid-column: 1 / -1;
      padding: 4rem 2rem;
      text-align: center;
      background: var(--surface);
    }

    .state-message p {
      color: var(--muted);
      font-size: 0.875rem;
      letter-spacing: 0.05em;
    }

    /* ─── LOADING SKELETON ─── */
    .skeleton-card {
      background: var(--surface);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .skeleton-img {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--border);
    }

    .skeleton-body {
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .skeleton-line {
      height: 12px;
      background: var(--border);
      border-radius: 2px;
    }

    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 70%; }
    .skeleton-line.tall { height: 18px; width: 90%; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ─── FOOTER ─── */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 2rem clamp(1.5rem, 5vw, 5rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-brand {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: -0.02em;
    }

    .footer-copy {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ─── WHATSAPP BUTTON ─── */
    .whatsapp-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 100;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #25D366;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.35), 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: waBounce 0.6s 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .whatsapp-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(37, 211, 102, 0.5), 0 3px 12px rgba(0,0,0,0.4);
    }

    .whatsapp-btn:active {
      transform: scale(0.96);
    }

    .whatsapp-btn svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .whatsapp-tooltip {
      position: absolute;
      right: calc(100% + 12px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      white-space: nowrap;
      padding: 0.4rem 0.8rem;
      border-radius: var(--radius);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .whatsapp-btn:hover .whatsapp-tooltip {
      opacity: 1;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes waBounce {
      from {
        opacity: 0;
        transform: scale(0.5);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .header-top { display: none; }

      .grid {
        grid-template-columns: 1fr;
      }

      footer {
        justify-content: center;
        text-align: center;
      }

      .whatsapp-btn {
        bottom: 1.25rem;
        right: 1.25rem;
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header>
    <div class="header-top">
      <span class="header-date" id="header-date"></span>
      <span class="header-tagline">Ideas · Perspectivas · Análisis</span>
    </div>
    <div class="header-main">
      <h1 class="site-name">El <span>Observador</span></h1>
      <p class="site-description">Reflexiones sobre el mundo que nos rodea</p>
      <div class="header-rule">
        <div class="header-rule-diamond"></div>
      </div>
    </div>
  </header>

  <!-- ─── MAIN ─── -->
  <main>
    <div class="section-label">
      <span>Últimos artículos</span>
    </div>

    <div class="grid" id="grid">
      <!-- Skeletons while loading -->
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line tall"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line medium"></div>
        </div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line tall"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line medium"></div>
        </div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line tall"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line medium"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- ─── FOOTER ─── -->
  <footer>
    <span class="footer-brand">El Observador</span>
    <span class="footer-copy">© <span id="year"></span> · Todos los derechos reservados</span>
  </footer>

  <!-- ─── WHATSAPP BUTTON ─── -->
  <a
    href="https://wa.me/56XXXXXXXXX"
    class="whatsapp-btn"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Contactar por WhatsApp"
  >
    <span class="whatsapp-tooltip">¡Escríbenos!</span>
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>

  <!-- ─── JAVASCRIPT ─── -->
  <script>
    // ── Set current date in header
    const headerDate = document.getElementById('header-date');
    const year = document.getElementById('year');
    const now = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    headerDate.textContent = now.toLocaleDateString('es-CL', opts);
    year.textContent = now.getFullYear();

    // ── Format date for cards
    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      return date.toLocaleDateString('es-CL', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // ── Build card HTML
    function buildCard(article, index) {
      const card = document.createElement('article');
      card.className = 'card';
      card.style.animationDelay = `${index * 0.1}s`;

      const imageHtml = article.imagen
        ? `<div class="card-image">
             <img
               src="${escapeHtml(article.imagen)}"
               alt="${escapeHtml(article.titulo)}"
               loading="lazy"
               onerror="this.parentElement.innerHTML='<div class=\\'card-image-placeholder\\'>${placeholderSvg()}</div>'"
             />
           </div>`
        : `<div class="card-image">
             <div class="card-image-placeholder">${placeholderSvg()}</div>
           </div>`;

      const num = String(index + 1).padStart(2, '0');

      card.innerHTML = `
        ${imageHtml}
        <div class="card-body">
          <div class="card-meta">
            <span class="card-date">${formatDate(article.fecha)}</span>
            <span class="card-dot"></span>
            <span class="card-num">${num}</span>
          </div>
          <h2 class="card-title">${escapeHtml(article.titulo)}</h2>
          <p class="card-desc">${escapeHtml(article.descripcion)}</p>
          <span class="card-arrow">Leer más →</span>
        </div>
      `;

      return card;
    }

    function placeholderSvg() {
      return `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Render articles
    function renderArticles(articles) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (!articles || articles.length === 0) {
        grid.innerHTML = `
          <div class="state-message">
            <p>No hay artículos disponibles por el momento.</p>
          </div>`;
        return;
      }

      articles.forEach((article, i) => {
        grid.appendChild(buildCard(article, i));
      });
    }

    function renderError(msg) {
      const grid = document.getElementById('grid');
      grid.innerHTML = `
        <div class="state-message">
          <p>${msg}</p>
        </div>`;
    }

    // ── Fetch articles.json
    fetch('./articulos.json')
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(data => {
        if (!Array.isArray(data)) throw new Error('El formato del JSON no es válido.');
        renderArticles(data);
      })
      .catch(err => {
        console.error('Error cargando artículos:', err);
        renderError('No se pudo cargar el contenido. Intenta de nuevo más tarde.');
      });
  </script>
</body>
</html>
